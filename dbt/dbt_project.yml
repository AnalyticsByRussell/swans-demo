name: 'swans_demo'
version: '1.0.0'
config-version: 2

profile: 'swans_demo'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  swans_demo:
    stg:
      +schema: stg
      +materialized: table

    fct:
      +schema: fct
      +materialized: table

    marts:
      +schema: marts
      +materialized: table

seeds:
  swans_demo:
    +schema: fct   # counties will land in fct schema